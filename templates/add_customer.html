<!DOCTYPE html>
<html>

<head>

<title>Add Customer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.sidebar{
height:100vh;
width:220px;
position:fixed;
background:#1f2d3d;
color:white;
padding:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

.sidebar a:hover{
color:#4da3ff;
}

.sidebar h3{
margin-bottom:30px;
}

.content{
margin-left:240px;
padding:30px;
}

.card{
border:none;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="sidebar">

<h3>Finance App</h3>

<a href="/dashboard">Dashboard</a>
<a href="/add_customer">Add Customer</a>
<a href="/customers">Customer Details</a>
<a href="/emi_reminders">EMI Reminders</a>
<a href="/logout">Logout</a>

</div>


<div class="content">

<h2>Add Customer</h2>

<div class="card p-4 mt-4">

<form method="POST">

<input type="text" name="name" class="form-control mb-3" placeholder="Customer Name" required>

<input type="text" name="mobile" class="form-control mb-3" placeholder="Mobile Number" required>

<input type="text" name="address" class="form-control mb-3" placeholder="Address" required>

<input type="number" name="loan" class="form-control mb-3" placeholder="Loan Amount" required>

<input type="number" name="interest" class="form-control mb-3" placeholder="Interest %" required>

<label>EMI Date (Every Month)</label>
<input type="number" name="emi_date" class="form-control mb-3" placeholder="Example: 5" required>

<label>Start Date</label>
<input type="date" name="start" class="form-control mb-3" required>

<label>End Date</label>
<input type="date" name="end" class="form-control mb-3" required>

<button class="btn btn-primary">
Save Customer
</button>

</form>

</div>

</div>

</body>
</html>

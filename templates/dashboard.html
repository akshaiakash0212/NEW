<!DOCTYPE html>
<html>

<head>

<title>Finance Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f6f9;
font-family:Segoe UI;
}

.sidebar{
height:100vh;
width:220px;
position:fixed;
background:#1f2d3d;
color:white;
padding:20px;
}

.sidebar h3{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

.sidebar a:hover{
color:#17a2b8;
}

.content{
margin-left:240px;
padding:30px;
}

.card{
border:none;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
border-radius:10px;
}

.chart-box{
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="sidebar">

<h3>Finance App</h3>

<a href="/dashboard">Dashboard</a>
<a href="/add_customer">Add Customer</a>
<a href="/customers">Customer Details</a>
<a href="/emi_reminders">EMI Reminders</a>
<a href="/logout">Logout</a>

</div>


<div class="content">

<h2>Dashboard</h2>

{% if pending_emi > 0 %}

<div class="alert alert-warning mt-3">

⚠ {{ pending_emi }} EMI payments pending

</div>

{% endif %}


<div class="row mt-4">

<div class="col-md-4">

<div class="card p-3">

<h5>Total Customers</h5>

<h2>{{ total_customers }}</h2>

</div>

</div>


<div class="col-md-4">

<div class="card p-3">

<h5>Total Loans</h5>

<h2>₹ {{ total_loans }}</h2>

</div>

</div>


<div class="col-md-4">

<div class="card p-3">

<h5>Pending EMI</h5>

<h2>{{ pending_emi }}</h2>

</div>

</div>

</div>


<div class="chart-box">

<h5>Finance Overview</h5>

<canvas id="financeChart"></canvas>

</div>


</div>


<script>

var ctx = document.getElementById("financeChart").getContext("2d");

var financeChart = new Chart(ctx, {

type: "bar",

data: {

labels: ["Customers", "Pending EMI"],

datasets: [{

label: "Finance Stats",

data: [{{ total_customers }}, {{ pending_emi }}],

borderWidth: 1

}]

},

options: {

responsive: true,

scales: {

y: {

beginAtZero: true

}

}

}

});

</script>

</body>

</html>

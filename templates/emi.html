<!DOCTYPE html>
<html>
<head>

<title>EMI Reminders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.sidebar{
height:100vh;
width:220px;
position:fixed;
background:#1f2d3d;
color:white;
padding:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

.sidebar h3{
margin-bottom:30px;
}

.content{
margin-left:240px;
padding:30px;
}

</style>

</head>

<body>

<div class="sidebar">

<h3>Finance App</h3>

<a href="/dashboard">Dashboard</a>
<a href="/add_customer">Add Customer</a>
<a href="/customers">Customer Details</a>
<a href="/emi_reminders">EMI Reminders</a>
<a href="/logout">Logout</a>

</div>


<div class="content">

<h2>Pending EMI List</h2>

<table class="table table-striped mt-4">

<tr>
<th>Name</th>
<th>Mobile</th>
<th>EMI Amount</th>
<th>Status</th>
</tr>

{% for c in customers %}

{% if c.emi_status == "Pending" %}

<tr>
<td>{{ c.name }}</td>
<td>{{ c.mobile }}</td>
<td>₹ {{ c.emi }}</td>
<td>
<span class="badge bg-danger">Pending</span>
</td>
</tr>

{% endif %}

{% endfor %}

</table>

</div>

</body>
</html>

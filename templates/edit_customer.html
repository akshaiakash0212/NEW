<!DOCTYPE html>
<html>

<head>

<title>Edit Customer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.sidebar{
height:100vh;
width:220px;
position:fixed;
background:#1f2d3d;
color:white;
padding:20px;
}

.sidebar h3{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:15px 0;
}

.content{
margin-left:240px;
padding:30px;
}

.card{
border:none;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="sidebar">

<h3>Finance App</h3>

<a href="/dashboard">Dashboard</a>
<a href="/add_customer">Add Customer</a>
<a href="/customers">Customer Details</a>
<a href="/emi_reminders">EMI Reminders</a>
<a href="/logout">Logout</a>

</div>


<div class="content">

<h2>Edit Customer</h2>

<div class="card p-4 mt-4">

<form method="POST">

<label>Name</label>
<input type="text" name="name" value="{{customer.name}}" class="form-control mb-3">

<label>Mobile</label>
<input type="text" name="mobile" value="{{customer.mobile}}" class="form-control mb-3">

<label>Address</label>
<input type="text" name="address" value="{{customer.address}}" class="form-control mb-3">

<button class="btn btn-primary">
Update Customer
</button>

</form>

</div>

</div>

</body>
</html>
